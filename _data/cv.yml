  summary: Tengjiao Wang is a research scientist and technical expert with Wireless Network Research Department, Huawei Technologies CO., Ltd, China. He received his B.S. and Ph. D. degrees from Tsinghua University, Beijing, China and was a visiting scholar with Massachusetts Institute of Technology, Cambridge, MA, USA. His research interests lie in the fields of 5G-A and 6G wireless communications, machine learning for wireless communications, electromagnetic information theory, and visible light communications. 

